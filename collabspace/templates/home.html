{% extends "layout.html" %} {% block title %}Feed{% endblock %} {% block head %}
<style>
  .feed {
    padding: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }
  .main {
    margin-left: 70px !important;
    padding-top: 60px !important;
    padding-left: 0 !important;
    padding-right: 0 !important;
  }
  .logo {
    top: 10px !important;
  }
  .card {
    background: #222;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .card:hover {
    background: #333;
  }
  .card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
    opacity: 1 !important;
    filter: brightness(1.2) !important;
    mix-blend-mode: normal !important;
  }
  .title {
    color: white;
    font-size: 18px;
    margin-bottom: 5px;
  }
  .author {
    color: #aaa;
    font-size: 14px;
  }
</style>
{% endblock %} {% block body %}
<div class="feed">
  {% for p in posts %}
  <div class="card" onclick="alert('{{ p.title }} by {{ p.full_name }}')">
    {% if p.image_path %}
    <img src="/static/{{ p.image_path }}" />
    {% endif %}
    <div class="title">{{ p.title }}</div>
    <div class="author">{{ p.full_name }}</div>
  </div>
  {% endfor %}
</div>
{% endblock %}
