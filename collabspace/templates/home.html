{% extends "layout.html" %} {% block title %}Feed{% endblock %} {% block head %}
<style>
  .feed-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .page-content {
    margin-left: 70px;
    padding: 60px 0 0;
  }

  .app-logo {
    top: 10px;
  }

  .post-card {
    background: #222;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 18px;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .post-card:hover {
    background: #2f2f2f;
  }

  .post-image {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
  }

  .post-title {
    font-size: 18px;
    margin-bottom: 4px;
  }

  .post-author {
    font-size: 14px;
    color: #aaa;
  }

  .post-actions {
    margin-top: 12px;
  }

  .btn-collab {
    width: 100%;
    padding: 8px 14px;
    border: none;
    border-radius: 6px;

    background: #00ff00;
    color: #000;

    font-size: 14px;
    cursor: pointer;
    transition: background 0.2s ease;
  }

  .btn-collab:hover {
    background: #00cc00;
  }
</style>
{% endblock %} {% block body %}
<div class="feed-grid">
  {% for p in posts %}
  <div class="post-card">
    {% if p.image_path %}
    <img src="/static/{{ p.image_path }}" class="post-image" alt="post image" />
    {% endif %}

    <div class="post-title">{{ p.title }}</div>
    <div class="post-author">{{ p.full_name }}</div>

    <div class="post-actions">
      <form action="/request_collab/{{ p.id }}" method="post">
        <button type="submit" class="btn-collab">Request Collab</button>
      </form>
    </div>
  </div>
  {% endfor %}
</div>
{% endblock %}
