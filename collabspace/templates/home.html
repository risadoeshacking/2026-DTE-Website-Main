{% extends "layout.html" %} {% block title %} Feed {% endblock %} {% block head
%}
<style>
  .feed {
    padding: 40px 40px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px 40px;
    margin: 0 auto;
  }
  .main {
    margin-left: 70px !important;
    padding-top: 60px !important;
    padding-left: 20px !important;
    padding-right: 20px !important;
  }
  .logo {
    top: 10px !important;
  }
  .card {
    background: #222;
    border: 1px solid #444;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .card:hover {
    background: #333;
  }
  .card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 10px;
    opacity: 1 !important;
    filter: brightness(1.2) !important;
    mix-blend-mode: normal !important;
  }
  .title {
    color: white;
    font-size: 18px;
    margin-bottom: 5px;
  }
  .author {
    color: #aaa;
    font-size: 14px;
    margin-bottom: 12px;
  }
</style>
{% endblock %} {% block body %}
<div class="feed">
  {% for p in posts %}
  <div
    class="card post-clickable"
    data-post-id="{{ p.id }}"
    data-post-title="{{ p.title }}"
    data-post-desc="{{ p.description or '' }}"
    data-post-image="{{ p.image_path or '' }}"
    data-post-author="{{ p.full_name }}"
    data-post-type="General"
  >
    {% if p.image_path %}
    <img src="/static/{{ p.image_path }}" />
    {% endif %}
    <div class="title">{{ p.title }}</div>
    <div class="author">{{ p.full_name }}</div>
    <form
      class="collab-hide"
      action="/request_collab/{{ p.id }}"
      method="post"
      style="margin-top: 10px; display: none"
    >
      <button type="submit" class="collab-btn">Request Collab</button>
    </form>
  </div>
  {% endfor %}
</div>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".collab-btn").forEach((btn) => {
      btn.addEventListener("click", async function (e) {
        e.preventDefault();
        const form = this.closest("form");
        await window.handleCollabRequest(form.action, this);
      });
    });
  });
</script>
{% endblock %}
