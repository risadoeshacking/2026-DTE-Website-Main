<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>{% block title %}Collab Space{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    {% block head %}{% endblock %}
  </head>
  <body>
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %} {% for category, message in messages %}
    <div
      class="flash-{{ category }}"
      style="position:fixed;top:20px;right:20px;background:{{ '#44ff44' if category=='success' else '#ff4444' }};color:white;padding:15px;border-radius:8px;z-index:9999;max-width:300px;"
    >
      {{ message }}
    </div>
    {% endfor %} {% endif %} {% endwith %} {% block body %}{% endblock %} {%
    block scripts %}{% endblock %}
  </body>
</html>
