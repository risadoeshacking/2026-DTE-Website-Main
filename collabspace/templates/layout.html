<!DOCTYPE html>
<html>
  <head>
    <title>{% block title %}Collab Space{% endblock %}</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <style>
      body {
        margin: 0;
        background: #000;
        color: #fff;
        font-family: Arial;
      }
      .sidebar {
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        width: 70px;
        background: #0095dd;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 30px;
        align-items: center;
      }
      .sidebar a {
        color: white;
        padding: 15px;
        border-radius: 12px;
        position: relative;
        transition: 0.2s;
      }
      .sidebar a:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .sidebar img {
        width: 24px;
        height: 24px;
        filter: brightness(0) invert(1);
      }
      .tooltip {
        position: absolute;
        left: 80px;
        top: 50%;
        transform: translateY(-50%);
        background: #333;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: 0.2s;
        z-index: 10;
      }
      .sidebar a:hover .tooltip {
        opacity: 1;
      }
      .logo {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        z-index: 100;
        text-align: center;
      }
      .main {
        margin-left: 70px;
        padding: 80px 20px 20px;
        min-height: 100vh;
      }
      @media (max-width: 768px) {
        .sidebar {
          width: 60px;
          gap: 25px;
        }
        .main {
          margin-left: 80px;
          padding-top: 100px;
        }
        .logo {
          width: 140px;
        }
      }
    </style>
    {% block head %}{% endblock %}
  </head>
  <body>
    {% if request.endpoint == 'home_feed' %}
    <img
      src="{{ url_for('static', filename='text_logo.png') }}"
      class="logo"
      alt="Collab Space"
    />
    {% endif %}
    <div class="sidebar">
      <a href="/">
        <img src="{{ url_for('static', filename='icons/home.svg') }}" alt="" />
        <div class="tooltip">Home</div>
      </a>
      <a href="/search">
        <img
          src="{{ url_for('static', filename='icons/search.svg') }}"
          alt=""
        />
        <div class="tooltip">Search</div>
      </a>
      <a href="/notifications">
        <img
          src="{{ url_for('static', filename='icons/notification.svg') }}"
          alt=""
        />
        <div class="tooltip">Notifications</div>
      </a>
      <a href="/new">
        <img src="{{ url_for('static', filename='icons/add.svg') }}" alt="" />
        <div class="tooltip">New Post</div>
      </a>
    </div>
    <div class="main">{% block body %}{% endblock %}</div>
    {% block scripts %}{% endblock %}
  </body>
</html>
