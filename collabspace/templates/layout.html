<!DOCTYPE html>
<html lang="en">
  <head>
    <title>{% block title %}Collab Space{% endblock %}</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />

    <style>
      body {
        margin: 0;
        background-color: #000;
        color: #fff;
        font-family: Arial, sans-serif;
      }

      .nav-sidebar {
        position: fixed;
        inset: 0 auto 0 0;
        width: 70px;
        background: #0095dd;

        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
      }

      .nav-item {
        position: relative;
        padding: 14px;
        border-radius: 10px;
        transition: background 0.2s ease;
      }

      .nav-item:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      .nav-icon {
        width: 24px;
        height: 24px;
        filter: brightness(0) invert(1);
      }

      /* Tooltip (kept simple on purpose) */
      .nav-tooltip {
        position: absolute;
        left: 80px;
        top: 50%;
        transform: translateY(-50%);

        background: #333;
        padding: 6px 10px;
        border-radius: 6px;
        font-size: 12px;

        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }

      .nav-item:hover .nav-tooltip {
        opacity: 1;
      }

      /* Top logo */
      .app-logo {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 160px;
        z-index: 100;
      }

      /* Page content */
      .page-content {
        margin-left: 70px;
        padding: 80px 20px 20px;
        min-height: 100vh;
      }

      /* Responsive tweaks */
      @media (max-width: 768px) {
        .nav-sidebar {
          width: 60px;
          gap: 24px;
        }

        .page-content {
          margin-left: 60px;
          padding-top: 100px;
        }

        .app-logo {
          width: 140px;
        }
      }
    </style>

    {% block head %}{% endblock %}
  </head>

  <body>
    {% if request.endpoint == 'home_feed' %}
    <img
      src="{{ url_for('static', filename='text_logo.png') }}"
      class="app-logo"
      alt="Collab Space logo"
    />
    {% endif %}

    <!-- Sidebar -->
    <nav class="nav-sidebar">
      <a href="/" class="nav-item">
        <img
          src="{{ url_for('static', filename='icons/home.svg') }}"
          class="nav-icon"
        />
        <span class="nav-tooltip">Home</span>
      </a>

      <a href="/search" class="nav-item">
        <img
          src="{{ url_for('static', filename='icons/search.svg') }}"
          class="nav-icon"
        />
        <span class="nav-tooltip">Search</span>
      </a>

      <a href="/notifications" class="nav-item">
        <img
          src="{{ url_for('static', filename='icons/notification.svg') }}"
          class="nav-icon"
        />
        <span class="nav-tooltip">Notifications</span>
      </a>

      <a href="/new" class="nav-item">
        <img
          src="{{ url_for('static', filename='icons/add.svg') }}"
          class="nav-icon"
        />
        <span class="nav-tooltip">New Post</span>
      </a>
    </nav>

    <!-- Main content -->
    <main class="page-content">{% block body %}{% endblock %}</main>

    {% block scripts %}{% endblock %}
  </body>
</html>
