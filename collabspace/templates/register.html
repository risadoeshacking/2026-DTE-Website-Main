<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Create Account | Collab Space</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>

  <body>
    <div class="split-container">
      <div class="left-side">
        <div class="glass-card">
          <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo"
          />

          <h2>Create Account</h2>
          <p class="sub">Start your journey</p>

          <form method="POST" action="{{ url_for('register_page') }}">
            <input
              type="text"
              name="fullname"
              placeholder="Full Name"
              required
            />
            <input type="email" name="email" placeholder="Email" required />
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />

            <button type="submit">Create</button>
          </form>

          <p class="link-text">
            Already have one?
            <a href="{{ url_for('login_page') }}">Login</a>
          </p>
        </div>
      </div>

      <div class="right-side big-text">
        <h1>Join Collab Space</h1>
        <p>Create. Share. Collaborate.</p>
      </div>
    </div>
  </body>
</html>
