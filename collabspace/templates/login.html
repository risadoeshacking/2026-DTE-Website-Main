<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | Collab Space</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <style>
      .flash-error {
        background: #ff4444;
        color: white;
        padding: 15px;
        margin: 20px;
        border-radius: 8px;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <div class="split-container">
      <!-- LEFT SIDE -->
      <div class="left-side">
        <h1>Collab Space</h1>
        <p>Work together. Build together.</p>
      </div>

      <!-- RIGHT SIDE (GLASS LOGIN) -->
      <div class="right-side">
        <div class="glass-card">
          <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo"
          />

          <h2>Login</h2>
          <p class="sub">Enter your details</p>

          {% with messages = get_flashed_messages(with_categories=true) %} {% if
          messages %} {% for category, message in messages %}
          <div class="flash-error">{{ message }}</div>
          {% endfor %} {% endif %} {% endwith %}

          <form method="POST" action="{{ url_for('login') }}">
            <input type="email" name="email" placeholder="Email" required />
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />

            <button type="submit">Sign In</button>
          </form>

          <p class="link-text">
            No account?
            <a href="{{ url_for('register') }}">Create one</a>
          </p>
        </div>
      </div>
    </div>
    <script>
      setTimeout(() => {
        document.querySelectorAll(".flash-error").forEach((el) => {
          el.style.transition = "opacity 1s";
          el.style.opacity = "0";
        });
      }, 4000);
    </script>
  </body>
</html>
