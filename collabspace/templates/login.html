<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login | Collab Space</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
  </head>

  <body>
    <div class="split-container">
      <!-- LEFT SIDE -->
      <div class="left-side">
        <h1>Collab Space</h1>
        <p>Work together. Build together.</p>
      </div>

      <!-- RIGHT SIDE (GLASS LOGIN) -->
      <div class="right-side">
        <div class="glass-card">
          <img
            src="{{ url_for('static', filename='logo.png') }}"
            class="logo"
          />

          <h2>Login</h2>
          <p class="sub">Enter your details</p>

          <form method="POST" action="{{ url_for('login_page') }}">
            <input type="email" name="email" placeholder="Email" required />
            <input
              type="password"
              name="password"
              placeholder="Password"
              required
            />

            <button type="submit">Sign In</button>
          </form>

          <p class="link-text">
            No account?
            <a href="{{ url_for('register_page') }}">Create one</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
