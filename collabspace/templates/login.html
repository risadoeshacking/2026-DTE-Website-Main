<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | CollabSpace</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='styles.css') }}"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="icon" href="{{ url_for('static', filename='collab.png') }}" />
  </head>
  <body>
    <div class="auth-container">
      <!-- Logo Section -->
      <div class="logo-section">
        <img
          src="{{ url_for('static', filename='collab.png') }}"
          alt="CollabSpace Logo"
          class="logo"
        />
        <h1>CollabSpace</h1>
        <p>Connect. Collaborate. Create.</p>
      </div>

      <!-- Login Card -->
      <div class="auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue to CollabSpace</p>

        <!-- Message Display -->
        <div id="message" class="flash-messages" style="display: none"></div>

        <!-- Login Form -->
        <form id="loginForm">
          <!-- Email Input -->
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                required
              />
              <i class="fas fa-envelope"></i>
            </div>
          </div>

          <!-- Password Input -->
          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Enter your password"
                required
              />
              <i class="fas fa-lock"></i>
              <button
                type="button"
                class="password-toggle"
                onclick="togglePassword()"
              >
                <i class="fas fa-eye" id="toggleIcon"></i>
              </button>
            </div>
          </div>

          <!-- Form Options -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" id="remember" />
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn-primary" id="loginBtn">
            Sign In
          </button>
        </form>

        <!-- Register Link -->
        <div class="auth-switch">
          Don't have an account?
          <a href="{{ url_for('register') }}">Create one</a>
        </div>
      </div>
    </div>

    <script>
      // Password Toggle
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.getElementById("toggleIcon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.classList.remove("fa-eye");
          toggleIcon.classList.add("fa-eye-slash");
        } else {
          passwordInput.type = "password";
          toggleIcon.classList.remove("fa-eye-slash");
          toggleIcon.classList.add("fa-eye");
        }
      }

      // Form Handling
      document
        .getElementById("loginForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();

          const email = document.getElementById("email").value;
          const password = document.getElementById("password").value;
          const messageDiv = document.getElementById("message");
          const loginBtn = document.getElementById("loginBtn");

          // Show loading
          loginBtn.classList.add("loading");
          loginBtn.disabled = true;

          // Simulate login check (stored in localStorage)
          setTimeout(() => {
            const users = JSON.parse(
              localStorage.getItem("collabspace_users") || "[]"
            );
            const user = users.find(
              (u) => u.email === email && u.password === password
            );

            if (user) {
              localStorage.setItem(
                "collabspace_currentUser",
                JSON.stringify(user)
              );
              messageDiv.innerHTML =
                '<div class="flash-message success">Login successful! Redirecting...</div>';
              messageDiv.style.display = "block";

              setTimeout(() => {
                alert("Welcome back, " + user.full_name + "!");
                // In a real app, redirect here
              }, 500);
            } else {
              messageDiv.innerHTML =
                '<div class="flash-message error">Invalid email or password. Please try again.</div>';
              messageDiv.style.display = "block";
            }

            loginBtn.classList.remove("loading");
            loginBtn.disabled = false;
          }, 1000);
        });

      // Clear message on input
      document.querySelectorAll("input").forEach((input) => {
        input.addEventListener("input", () => {
          document.getElementById("message").style.display = "none";
        });
      });
    </script>
  </body>
</html>
